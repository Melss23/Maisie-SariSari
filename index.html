<!DOCTYPE html>
<html>
<head>
  <title>Sari-Sari POS Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f4f6f9; }
    .header { background:#4CAF50; color:white; padding:15px; text-align:center; }
    .nav { display:flex; background:white; }
    .nav button { flex:1; padding:12px; border:none; }
    .container { padding:20px; }
    .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
    input,button { width:100%; padding:10px; margin-top:10px; }
    .hidden { display:none; }
    .ads { text-align:center; padding:30px; background:#fff3cd; }
  </style>
</head>

<body>

<div class="header">🛒 Sari-Sari POS</div>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="nav">
    <button onclick="showPage('home')">🏠 Home</button>
    <button onclick="showPage('pos')">💳 Transaction</button>
    <button onclick="showPage('admin')" id="adminBtn">📊 Admin</button>
  </div>

  <div class="container">

    <!-- HOME -->
    <div id="home" class="card">
      <h2>Welcome</h2>
      <div class="ads">📢 PROMO: Buy 2 Get 1 Free!</div>
    </div>

    <!-- POS -->
    <div id="pos" class="card hidden">
      <input id="barcode" placeholder="Enter barcode">
      <button onclick="scan()">📷 Scan</button>

      <div id="reader"></div>

      <div id="pname">Product: -</div>
      <div id="pprice">Price: -</div>
      <div>Stock: <span id="pstock">-</span></div>

      <input id="qty" type="number" value="1">

      <button onclick="buy()">Buy</button>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="card hidden">
      <button onclick="load()">Refresh</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="topSelling()">Top Selling</button>
      <div id="report"></div>
    </div>

  </div>
</div>

<script>
let URL = "https://script.google.com/macros/s/AKfycby6lyDIk9Gtdgk3hyIrDeWF3a5-PUdGw_UE98a2vFplhj6ln1RFY45gJYRVghCpQU0C/exec";

let products = {};
let sales = [];

// LOGIN
async function handleLogin(){
  if(user.value==="admin" && pass.value==="1234"){
    adminBtn.style.display="block";
  } else if(user.value==="cashier" && pass.value==="1234"){
    adminBtn.style.display="none";
  } else {
    alert("Invalid login");
    return;
  }

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  await load();
}

// NAVIGATION
function showPage(page){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
}

// LOAD DATA
async function load(){
  try {
    let res = await fetch(URL);
    let data = await res.json();

    console.log("DATA:", data);

    products = {};
    data.products.slice(1).forEach(r=>{
      products[String(r[0]).trim()] = {
        name:r[1],
        srp:Number(r[2]),
        margin:Number(r[3]),
        stock:Number(r[4])
      };
    });

    sales = data.sales;

    console.log("PRODUCTS:", products);
    console.log("SALES:", sales);

  } catch(err){
    alert("Error loading data");
    console.error(err);
  }
}

// LOAD PRODUCT
function loadProduct(){
  let code = barcode.value.trim();
  let p = products[code];

  if(p){
    pname.innerText = "Product: " + p.name;
    pprice.innerText = "Price: ₱" + p.srp;
    pstock.innerText = p.stock;
  } else {
    pname.innerText = "Product: NOT FOUND";
    pprice.innerText = "-";
    pstock.innerText = "-";
  }
}

// AUTO LOAD ON INPUT
barcode.addEventListener("input", loadProduct);

// SCANNER
async function scan(){
  document.getElementById("reader").innerHTML = "";

  const qr = new Html5Qrcode("reader");

  try {
    await qr.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        barcode.value = decodedText;
        qr.stop();
        loadProduct();
      }
    );
  } catch(err){
    alert("Camera error: " + err);
  }
}

// BUY
async function buy(){
  let code = barcode.value.trim();
  let p = products[code];
  let q = parseInt(qty.value);

  if(!p){
    alert("Product not found");
    return;
  }

  if(p.stock < q){
    alert("Not enough stock");
    return;
  }

  let total = p.srp * q;
  let profit = p.margin * q;

  let payload = {
    barcode: code,
    name: p.name,
    qty:q,
    total:total,
    profit:profit
  };

  console.log("SENDING:", payload);

  let res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify(payload)
  });

  let msg = await res.text();
  alert(msg);

  await load();
}

// EXPORT EXCEL
function exportExcel(){

  if(!sales || sales.length <= 1){
    alert("No data");
    return;
  }

  let formatted = sales.slice(1).map(s => ({
    Date: s[0],
    Product: s[1],
    Qty: s[2],
    Total: s[3],
    Profit: s[4]
  }));

  let ws = XLSX.utils.json_to_sheet(formatted);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Sales");
  XLSX.writeFile(wb, "sales.xlsx");
}

// TOP SELLING
function topSelling(){
  let map = {};

  sales.slice(1).forEach(s=>{
    map[s[1]] = (map[s[1]]||0)+Number(s[2]);
  });

  report.innerHTML = Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .map(i=>i[0]+" - "+i[1]+" pcs")
    .join("<br>");
}
</script>

</body>
</html>
